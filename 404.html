<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found | Mohammad Efazati</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/jpeg" href="/assets/images/me.jpg">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(113, 134, 255, 0.28), transparent 60%),
                radial-gradient(ellipse 60% 40% at 85% 85%, rgba(254, 117, 135, 0.18), transparent 60%),
                #050816;
            color: #C9D2EA;
            text-align: center;
            padding: 32px;
        }
        .code {
            font-size: clamp(80px, 18vw, 200px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.04em;
            background: linear-gradient(90deg, #7186FF 11%, #FE7587 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 16px;
        }
        h1 {
            color: #fff;
            font-size: clamp(20px, 3vw, 28px);
            margin: 0 0 12px;
            font-weight: 700;
        }
        p { color: #8F9BB7; max-width: 480px; margin: 0 auto 32px; line-height: 1.6; }
        .ctas { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        a.btn {
            display: inline-block; padding: 12px 24px; border-radius: 36px;
            font-weight: 500; font-size: 15px; text-decoration: none;
            transition: all .15s ease;
        }
        .btn-primary {
            background: #0077FF; color: #fff;
            box-shadow: 0 8px 30px rgba(0,119,255,0.35);
        }
        .btn-primary:hover { background: #2289ff; }
        .btn-ghost {
            border: 1px solid rgba(255,255,255,0.2); color: #fff;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.06); }
    </style>
</head>
<body>
    <main>
        <p class="code">404</p>
        <h1>That page didn't deploy.</h1>
        <p>The link you followed is broken or the page has moved. Let's get you back to where the engineers actually ship.</p>
        <div class="ctas">
            <a href="/" class="btn btn-primary">Back home</a>
            <a href="https://easyenv.io/" class="btn btn-ghost">Visit EasyEnv</a>
        </div>
    </main>
</body>
</html>
